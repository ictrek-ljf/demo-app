# ===== Workflow 名称 =====
name: CI Pipeline

# ===== 触发器 =====
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ===== Workflow 级环境变量 =====
env:
  IMAGE_NAME: demo-app

# ===== Job 定义 =====
jobs:

  # ---------- Job 1：构建 + 扫描 ----------
  build-and-scan:
    runs-on: self-hosted
    steps:

      # 步骤 1：拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤 2：构建 Docker 镜像
      - name: Build Image
        run: |
          IMAGE_TAG=${{ github.run_number }}
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          docker build             -t ${{ secrets.HARBOR_URL }}/demo/${{ env.IMAGE_NAME }}:$IMAGE_TAG             .

      # 步骤 3：Trivy 安全扫描
      - name: Security Scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock             aquasec/trivy image             --severity HIGH,CRITICAL             --exit-code 0             --skip-db-update             ${{ secrets.HARBOR_URL }}/demo/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # 步骤 4：单元测试
      - name: Unit Tests
        run: |
          echo "===== 单元测试 ====="
          echo "单元测试通过"

      # 步骤 5：推送到 Harbor
      - name: Push to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" |             docker login ${{ secrets.HARBOR_URL }}               -u ${{ secrets.HARBOR_USERNAME }} --password-stdin
          docker push ${{ secrets.HARBOR_URL }}/demo/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          echo "镜像已推送"

  # ---------- Job 2：部署到 K8s ----------
  deploy:
    needs: build-and-scan
    runs-on: self-hosted
    steps:
      - name: Deploy to K8s
        run: |
          kubectl set image deployment/demo-app             demo-app=${{ secrets.HARBOR_URL }}/demo/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}             -n default --record
          kubectl rollout status deployment/demo-app -n default --timeout=120s

      - name: Smoke Test
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://demo-app-svc.default/health)
            if [ "$STATUS" = "200" ]; then
              echo "冒烟测试通过"
              exit 0
            fi
            echo "重试 $i..."
            sleep 3
          done
          echo "冒烟测试失败"
          exit 1
