# ===== Workflow 名称 =====
name: CI Pipeline

# ===== 触发器 =====
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ===== Workflow 级环境变量 =====
env:
  IMAGE_NAME: demo-app

# ===== Job 定义 =====
jobs:

  # ---------- Job 1：构建 + 扫描 ----------
  build-and-scan:
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:

      # 步骤 0：配置 git 使用 SSH
      - name: Setup Git SSH
        run: git config --global url."git@github.com:".insteadOf "https://github.com/"

      # 步骤 1：拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤 2：构建 Docker 镜像
      - name: Build Image
        id: build
        run: |
          IMAGE_TAG=${{ github.run_number }}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          IMAGE_FULL="${{ secrets.HARBOR_URL }}/demo/${{ env.IMAGE_NAME }}:$IMAGE_TAG"
          echo "Using image: $IMAGE_FULL"
          docker build -t "$IMAGE_FULL" .

      # 步骤 3：Trivy 安全扫描（挂载本地 DB 缓存）
      - name: Security Scan
        run: |
          IMAGE_FULL="${{ secrets.HARBOR_URL }}/demo/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.image_tag }}"
          docker run --rm             -v /var/run/docker.sock:/var/run/docker.sock             -v /home/ictrek/.trivy-cache:/root/.cache/trivy             aquasec/trivy image             --severity HIGH,CRITICAL             --exit-code 0             --skip-db-update             "$IMAGE_FULL"

      # 步骤 4：单元测试
      - name: Unit Tests
        run: |
          echo "===== 单元测试 ====="
          echo "单元测试通过"

      # 步骤 5：推送到 Harbor
      - name: Push to Harbor
        run: |
          IMAGE_FULL="${{ secrets.HARBOR_URL }}/demo/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.image_tag }}"
          echo "${{ secrets.HARBOR_PASSWORD }}" |             docker login "${{ secrets.HARBOR_URL }}"               -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin
          docker push "$IMAGE_FULL"
          echo "镜像已推送: $IMAGE_FULL"

  # ---------- Job 2：部署到 K8s ----------
  deploy:
    needs: build-and-scan
    runs-on: self-hosted
    steps:
      - name: Deploy to K8s
        run: |
          IMAGE_FULL="${{ secrets.HARBOR_URL }}/demo/${{ env.IMAGE_NAME }}:${{ needs.build-and-scan.outputs.image_tag }}"
          kubectl set image deployment/demo-app             demo-app="$IMAGE_FULL"             -n default --record
          kubectl rollout status deployment/demo-app -n default --timeout=120s

      - name: Smoke Test
        run: |
          CLUSTER_IP=$(kubectl get svc demo-app-svc -n default -o jsonpath='{.spec.clusterIP}')
          echo "Service ClusterIP: $CLUSTER_IP"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{{http_code}}" http://$CLUSTER_IP/health)
            if [ "$STATUS" = "200" ]; then
              echo "冒烟测试通过"
              exit 0
            fi
            echo "重试 $i..."
            sleep 3
          done
          echo "冒烟测试失败"
          exit 1
